<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ready for Pickup — Oakville Hotel Foods</title>
    <meta name="description"
        content="Oakville Hotel Foods — order pickup display showing orders ready for customer pickup.">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="display-page">

    <header class="display-header">
        <h1>Ready for Pickup</h1>
    </header>

    <main id="orderGrid" class="order-grid">
        <div class="empty-state" style="grid-column: 1 / -1;">
            <div class="empty-state-icon">🍽️</div>
            <p>No orders ready yet</p>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/display.js"></script>

    <!-- CSS Hot Reloader (checks for style changes without full page refresh) -->
    <script>
        let currentCss = "";
        fetch('css/style.css?' + Date.now())
            .then(res => res.text())
            .then(text => currentCss = text);

        setInterval(() => {
            fetch('css/style.css?' + Date.now())
                .then(res => res.text())
                .then(newCss => {
                    if (currentCss && newCss && currentCss !== newCss) {
                        currentCss = newCss;
                        const newLink = document.createElement("link");
                        newLink.rel = "stylesheet";
                        newLink.href = "css/style.css?v=" + Date.now();
                        document.head.appendChild(newLink);

                        setTimeout(() => {
                            const oldLinks = document.querySelectorAll('link[href^="css/style.css"]');
                            if (oldLinks.length > 1) oldLinks[0].remove();
                        }, 500);
                    }
                });
        }, 60000); // Polls GitHub every 60 seconds
    </script>
</body>

</html>
